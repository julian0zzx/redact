name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.8.2)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  VERSION: ${{ inputs.tag || github.ref_name }}

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: redact
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: redact
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: redact
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: redact
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: redact.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build CLI binary (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
          cargo build --release --package redact-cli --target ${{ matrix.target }}

      - name: Build CLI binary (other targets)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --package redact-cli --target ${{ matrix.target }}

      - name: Strip binary (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Strip binary (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../redact-${{ matrix.target }}.tar.gz ${{ matrix.binary_name }}

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../redact-${{ matrix.target }}.zip ${{ matrix.binary_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redact-${{ matrix.target }}
          path: redact-${{ matrix.target }}.*

  create-release:
    name: Create Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create draft GitHub Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: true
          prerelease: ${{ contains(env.VERSION, '-') }}
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        run: |
          gh release edit ${{ env.VERSION }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Get version from tag
        run: |
          TAG_VERSION="${VERSION#v}"
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$CARGO_VERSION, Tag=$TAG_VERSION"
            exit 1
          fi

      - name: Publish redact-core
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p redact-core
        continue-on-error: true

      - name: Wait for redact-core
        run: sleep 45

      - name: Publish redact-ner
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p redact-ner
        continue-on-error: true

      - name: Wait for redact-ner
        run: sleep 45

      - name: Publish redact-api
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p redact-api
        continue-on-error: true

      - name: Publish redact-cli
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p redact-cli
        continue-on-error: true

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: meta
        run: |
          VER="${VERSION#v}"
          MAJOR="${VER%%.*}"
          MINOR="${VER%.*}"
          IMAGE="ghcr.io/${{ github.repository }}"
          TAGS="${IMAGE}:${VER},${IMAGE}:${MINOR},${IMAGE}:${MAJOR},${IMAGE}:latest"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  docker-full:
    name: Build and Push Docker Image (full + NER)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags (full)
        id: meta-full
        run: |
          VER="${VERSION#v}"
          MAJOR="${VER%%.*}"
          MINOR="${VER%.*}"
          IMAGE="ghcr.io/${{ github.repository }}"
          TAGS="${IMAGE}:full,${IMAGE}:${VER}-full,${IMAGE}:${MINOR}-full,${IMAGE}:${MAJOR}-full"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build full image for smoke test (amd64 only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ner
          load: true
          tags: redact-full:smoke-test
          build-args: |
            NER_BASE=ghcr.io/${{ github.repository }}-ner-base:v2
          cache-from: type=gha,scope=ner-full
          cache-to: type=gha,mode=max,scope=ner-full

      - name: Smoke test NER image
        run: |
          echo "--- Starting smoke test container ---"
          docker run -d --name smoke-test -p 8080:8080 redact-full:smoke-test
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "ERROR: Server failed to start within 30s"
              docker logs smoke-test
              exit 1
            fi
            sleep 1
          done

          echo "--- Health check ---"
          HEALTH=$(curl -sf http://localhost:8080/healthz)
          echo "$HEALTH" | python3 -m json.tool
          RECOGNIZERS=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('recognizers',0))")
          if [ "$RECOGNIZERS" -lt 2 ]; then
            echo "ERROR: Expected at least 2 recognizers (pattern + NER), got $RECOGNIZERS"
            docker rm -f smoke-test
            exit 1
          fi
          echo "OK: $RECOGNIZERS recognizers"

          echo "--- NER entity detection ---"
          RESULT=$(curl -sf http://localhost:8080/api/v1/analyze \
            -H 'Content-Type: application/json' \
            -d '{"text": "John Smith works at Microsoft in Seattle"}')
          echo "$RESULT" | python3 -m json.tool
          NER_FOUND=$(echo "$RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          results = data.get('results', [])
          types = {e['entity_type'] for e in results}
          ner_types = types & {'PERSON', 'ORGANIZATION', 'LOCATION'}
          print(len(ner_types))
          ")
          if [ "$NER_FOUND" -lt 2 ]; then
            echo "ERROR: Expected at least 2 NER entity types (PERSON/ORG/LOC), found $NER_FOUND"
            docker rm -f smoke-test
            exit 1
          fi
          echo "OK: $NER_FOUND NER entity types detected"

          docker rm -f smoke-test
          echo "--- Smoke test passed ---"

      - name: Build and push full image (pattern + ONNX NER)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ner
          push: true
          tags: ${{ steps.meta-full.outputs.tags }}
          build-args: |
            NER_BASE=ghcr.io/${{ github.repository }}-ner-base:v2
          cache-from: type=gha,scope=ner-full
          cache-to: type=gha,mode=max,scope=ner-full
          platforms: linux/amd64,linux/arm64
